<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthCare 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #4f8ef7;
      --blue-dark: #3a7be8;
      --blue-light: #ebf3ff;
      --red: #e74c3c;
      --green: #27ae60;
      --bg: #f4f6fb;
      --surface: #ffffff;
      --border: #e8eaef;
      --text: #111827;
      --text-muted: #6b7280;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* ── Header ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
    }
    .app-header-icon { width: 28px; height: 28px; }
    .app-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a2e;
      flex: 1;
    }
    .save-status {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .save-status.idle    { background:#f0f0f0; color:#888; }
    .save-status.saving  { background:#fff8e1; color:#f39c12; }
    .save-status.saved   { background:#e8f5e9; color:var(--green); }
    .save-status.error   { background:#fdecea; color:var(--red); }

    /* ── Main 2-col Layout (desktop) ── */
    .main-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 1fr 1fr;
      grid-template-areas:
        "supp  cal"
        "fit   cal";
      gap: 10px;
      padding: 10px;
      flex: 1;
      min-height: calc(100vh - 52px);
    }

    /* Permanent grid-area assignments (work across all breakpoints) */
    .main-layout > .panel:first-child { grid-area: supp; }
    .cal-panel                         { grid-area: cal; }
    .main-layout > .panel:last-child   { grid-area: fit; }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 11px 13px 9px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 7px;
    }
    .panel-actions { display: flex; gap: 5px; }
    .btn-add, .btn-remove {
      flex: 1;
      padding: 5px 8px;
      border: none;
      border-radius: 7px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-add    { background: var(--blue); color: #fff; }
    .btn-add:hover { background: var(--blue-dark); }
    .btn-remove { background: #f4f4f4; color: #555; border: 1px solid #ddd; }
    .btn-remove:hover { background: #fde8e8; color: var(--red); }

    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 7px;
    }
    .empty-hint {
      text-align: center;
      color: #bbb;
      font-size: 0.78rem;
      margin-top: 22px;
      font-family: "Noto Sans KR", sans-serif;
      line-height: 1.6;
    }
    .item-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 9px;
      margin-bottom: 3px;
      transition: background 0.12s;
    }
    .item-card:hover { background: #f7f8fc; }
    .item-icon-wrap { width: 34px; height: 34px; flex-shrink: 0; }
    .item-icon-wrap svg { width: 34px; height: 34px; }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

    /* ── Calendar Panel ── */
    .cal-panel {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .cal-header {
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cal-title { font-size: 0.85rem; font-weight: 700; color: #1a1a2e; }
    .cal-nav { display: flex; gap: 5px; }
    .btn-nav {
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      background: #f8f8f8;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-nav:hover { background: #e8e8e8; }

    .cal-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 5px;
      flex-shrink: 0;
    }
    .cal-wd {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 4px 0;
    }
    .cal-wd.sat { color: #2e6be6; }
    .cal-wd.sun { color: var(--red); }

    .cal-weeks {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .cal-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      /* each row: roughly 1/4 of remaining calendar height, min 130px */
      flex: 1;
      min-height: 130px;
    }
    .cal-day {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 7px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.1s, border-color 0.1s;
      position: relative;
    }
    .cal-day:hover { background: #f5f8ff; }
    .cal-day.this-week { border-color: #c2d7ff; background: #f8fbff; }
    .cal-day.today     { border-color: var(--blue) !important; background: var(--blue-light) !important; }
    .cal-day.pressing  { background: #dde8ff !important; }

    .day-num {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .day-num.today-n { color: var(--blue); }
    .day-num.sat-n   { color: #2e6be6; }
    .day-num.sun-n   { color: var(--red); }

    .day-entries { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 3px; }
    .d-entry {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      line-height: 1.3;
      overflow: hidden;
    }
    .d-entry-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .d-entry-icon svg { width: 16px; height: 16px; }
    .d-entry-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #333;
    }
    .d-entry.type-supplement .d-entry-text { color: #2e7d32; }
    .d-entry.type-fitness    .d-entry-text { color: #1565c0; }

    /* right-click hint tooltip (desktop only) */
    .cal-day::after {
      content: "우클릭: 편집";
      position: absolute;
      bottom: 3px; right: 4px;
      font-size: 0.52rem;
      color: #bbb;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .cal-day:hover::after { opacity: 1; }

    /* ── Day Detail Popup ── */
    .detail-modal {
      width: 460px;
      max-height: 82vh;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 14px;
      margin-bottom: 4px;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }
    .detail-date {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.1;
    }
    .detail-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .detail-close-btn {
      width: 30px; height: 30px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.82rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #555;
      transition: background 0.12s;
    }
    .detail-close-btn:hover { background: #e0e0e0; }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .detail-section-title {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 14px 0 7px;
    }
    .detail-section-title:first-child { margin-top: 6px; }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 10px 12px;
      border-radius: 11px;
      background: #f7f9fc;
      margin-bottom: 6px;
      border: 1px solid #eef0f5;
    }
    .detail-item-icon     { width: 40px; height: 40px; flex-shrink: 0; }
    .detail-item-icon svg { width: 40px; height: 40px; }
    .detail-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: #111;
    }
    .detail-item-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .detail-item-time {
      margin-left: auto;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--blue);
      white-space: nowrap;
      padding-left: 8px;
    }
    .detail-empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 36px 0 20px;
      line-height: 1.8;
      font-family: "Noto Sans KR", sans-serif;
    }

    /* ── Supplement info (right-click / long-press) ── */
    .info-dot {
      color: #c3ccd8;
      font-size: 0.95rem;
      flex-shrink: 0;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.12s;
    }
    .item-card:hover .info-dot { color: var(--blue); }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 2px;
      border-bottom: 1px solid var(--border);
    }
    .info-k { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
    .info-v { font-size: 0.9rem; color: #111; font-weight: 700; text-align: right; }
    .info-note {
      margin-top: 12px;
      padding: 11px 13px;
      background: var(--blue-light);
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #33415c;
      font-family: "Noto Sans KR", sans-serif;
    }

    /* ── Delete button inside info popup (below 확인) ── */
    .btn-delete {
      flex: 1; padding: 9px;
      background: #fff; color: var(--red);
      border: 1.5px solid var(--red); border-radius: 9px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .btn-delete:hover { background: var(--red); color: #fff; }

    /* ── Muscle diagram (fitness info popup) ── */
    .muscle-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 0 4px;
    }
    .muscle-wrap svg { max-width: 100%; height: auto; }
    .muscle-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 8px 0 2px;
    }
    .muscle-tag {
      font-size: 0.74rem; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      font-family: "Noto Sans KR", sans-serif;
    }
    .muscle-tag.primary   { background: #fdecea; color: var(--red); }
    .muscle-tag.secondary { background: #eef1f6; color: #5b6473; }
    .muscle-legend {
      display: flex; gap: 14px; justify-content: center;
      font-size: 0.68rem; color: var(--text-muted);
      margin-top: 2px; font-family: "Noto Sans KR", sans-serif;
    }
    .muscle-legend span { display: inline-flex; align-items: center; gap: 4px; }
    .lg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    /* ── Per-item time inside Day modal ── */
    .day-item-body { flex: 1; min-width: 0; }
    .day-item-time-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .time-stepper { display: flex; align-items: center; gap: 8px; }
    .step-btn {
      width: 28px; height: 28px;
      border: 1.5px solid var(--border);
      background: #f8f8f8;
      border-radius: 7px;
      font-size: 1.05rem; font-weight: 700;
      color: #555; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; padding: 0;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .step-btn:hover  { background: #eef3ff; border-color: var(--blue); color: var(--blue); }
    .step-btn:active { background: #dbe7ff; }
    .step-btn:disabled { opacity: 0.4; cursor: default; background: #f4f4f4; border-color: var(--border); color: #999; }
    .time-val {
      min-width: 78px; text-align: center;
      font-size: 0.86rem; font-weight: 700; color: var(--blue);
    }
    .time-hint { font-size: 0.66rem; color: var(--text-muted); }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      animation: fadeIn 0.15s ease;
    }
    .overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 20px;
      width: 360px;
      max-width: 92vw;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0,0,0,0.16);
      animation: slideUp 0.18s ease;
    }
    @keyframes slideUp { from { transform:translateY(16px); opacity:0 } to { transform:none; opacity:1 } }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 13px;
    }
    .modal-section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 10px 0 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .modal input[type="text"],
    .modal input[type="time"],
    .modal input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--blue); }

    .sets-reps-row {
      display: flex; gap: 8px; align-items: center;
    }
    .sets-reps-row input { flex: 1; }
    .sr-x { font-size: 1.1rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }

    /* Icon grid */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      max-height: 240px;
      overflow-y: auto;
      padding: 3px;
    }
    .icon-opt {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 5px 6px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
      transition: border-color 0.12s, background 0.12s;
    }
    .icon-opt:hover { border-color: var(--blue); }
    .icon-opt.sel   { border-color: var(--blue); background: var(--blue-light); }
    .icon-opt svg   { width: 34px; height: 34px; margin-bottom: 4px; }

    /* Modal actions */
    .modal-actions {
      display: flex; gap: 8px; margin-top: 14px; flex-shrink: 0;
    }
    .btn-primary {
      flex: 1; padding: 9px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 9px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-secondary {
      flex: 1; padding: 9px;
      background: #f4f4f4; color: #555;
      border: 1px solid #ddd; border-radius: 9px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-danger { background: var(--red); }
    .btn-danger:hover { background: #c0392b; }

    /* Day menu modal */
    .day-modal-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .day-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #555;
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .day-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 8px; border-radius: 9px; cursor: pointer;
    }
    .day-item:hover { background: #f5f8ff; }
    .day-item-icon  { width: 30px; height: 30px; flex-shrink: 0; }
    .day-item-icon svg { width: 30px; height: 30px; }
    .day-item-name  { font-size: 0.82rem; font-weight: 600; flex: 1; }
    .day-item-meta  { font-size: 0.7rem; color: var(--text-muted); }
    .check-circle {
      width: 22px; height: 22px;
      border: 2px solid #ccc; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; flex-shrink: 0;
      transition: all 0.12s;
    }
    .check-circle.on { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* Remove list */
    .remove-list { overflow-y: auto; max-height: 280px; }
    .rm-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 9px; border-radius: 9px; cursor: pointer;
      transition: background 0.12s;
    }
    .rm-item:hover { background: #fff4f4; }
    .rm-item.sel   { background: #fde8e8; }
    .rm-item-name  { flex: 1; font-size: 0.82rem; font-weight: 600; }
    .rm-chk        { font-size: 0.9rem; color: #ccc; }
    .rm-item.sel .rm-chk { color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* ── Responsive: narrow desktop / large tablet (≤768px) ── */
    @media (max-width: 768px) {
      .main-layout {
        grid-template-columns: 200px 1fr;
        gap: 7px;
        padding: 7px;
        min-height: calc(100vh - 50px);
      }
      .cal-week { min-height: 110px; }
      .d-entry  { font-size: 0.66rem; }
    }

    /* ── Responsive: mobile portrait (≤600px) ── */
    @media (max-width: 600px) {
      .app-header h1 { font-size: 0.9rem; }

      .main-layout {
        /* calendar full-width on top, two panels side-by-side below */
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        grid-template-areas:
          "cal   cal"
          "supp  fit";
        gap: 8px;
        padding: 8px;
        min-height: 0;
      }

      .cal-panel {
        grid-area: cal;
        /* give the calendar plenty of room on mobile */
        min-height: 72vw;
      }

      /* supplement panel = left bottom */
      .main-layout > .panel:first-child {
        grid-area: supp;
        min-height: 260px;
        max-height: 340px;
      }

      /* fitness panel = right bottom */
      .main-layout > .panel:last-child {
        grid-area: fit;
        min-height: 260px;
        max-height: 340px;
      }

      /* smaller side panels: compact headers */
      .panel-title    { font-size: 0.76rem; }
      .btn-add,
      .btn-remove     { font-size: 0.7rem; padding: 5px 6px; }
      .item-name      { font-size: 0.76rem; }
      .item-meta      { font-size: 0.66rem; }
      .item-icon-wrap { width: 28px; height: 28px; }
      .item-icon-wrap svg { width: 28px; height: 28px; }

      /* calendar: tighter but still readable */
      .cal-wd         { font-size: 0.68rem; }
      .day-num        { font-size: 0.72rem; }
      .cal-week       { min-height: 80px; }
      .d-entry        { font-size: 0.62rem; gap: 3px; }
      .d-entry-icon, .d-entry-icon svg { width: 13px; height: 13px; }
      .cal-day        { padding: 4px 4px; border-radius: 8px; }

      .cal-day::after { display: none; }

      /* wider modals on small screens */
      .modal { padding: 16px; }
      .icon-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .icon-opt svg { width: 30px; height: 30px; }
      .icon-opt { font-size: 0.65rem; }
    }

    /* ── Very small phones (≤380px) ── */
    @media (max-width: 380px) {
      .main-layout {
        grid-template-columns: 1fr;
        grid-template-areas:

          "supp"
          "fit";

        min-height: 90vw;

      .main-layout > .panel:first-child,
      .main-layout > .panel:last-child {
        max-height: 280px;

<div id="app">

  <main class="main-layout">

    <!-- LEFT: Supplements -->
    <section class="panel">
      <div class="panel-header">

      </div>
      <div class="item-list" id="supp-list"></div>

        <span class="cal-title" id="cal-range">캘린더</span>
        <div class="cal-nav">
          <button class="btn-nav" onclick="shiftView(-1)" title="이전 주">&#8592;</button>
          <button class="btn-nav" onclick="shiftView(0)"  title="오늘로">○</button>
          <button class="btn-nav" onclick="shiftView(+1)" title="다음 주">&#8594;</button>
        </div>
      </div>
      <div class="cal-body">
        <div class="cal-weekdays">
          <div class="cal-wd">월</div>
          <div class="cal-wd">화</div>
          <div class="cal-wd">수</div>
          <div class="cal-wd">목</div>
          <div class="cal-wd">금</div>
          <div class="cal-wd sat">토</div>
          <div class="cal-wd sun">일</div>
        </div>
        <div class="cal-weeks" id="cal-weeks"></div>
      </div>
    </section>

    <!-- RIGHT: Fitness -->
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">🏋️ 피트니스 관리</div>
        <div class="panel-actions">
          <button class="btn-add"    onclick="openAddModal('fitness')">+ 추가</button>
          <button class="btn-remove" onclick="openRemoveModal('fitness')">− 제거</button>
        </div>
      </div>
      <div class="item-list" id="fit-list"></div>
    </section>

  </main>
</div>

<div class="overlay hidden" id="add-overlay">

</div>

<div class="overlay hidden" id="rm-overlay">

// ═══════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d => {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmt12 = t => {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${String(h%12||12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
};
function getThisMonday() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const diff = dow===0 ? -6 : 1-dow;
  return addDays(today, diff);
}
function iconOf(type, key) {
  const lib = type==='supplement' ? SUPP_ICONS : FIT_ICONS;
  return (lib[key] || Object.values(lib)[0]).svg;
}
// ── Time math (for recommended-time auto-fill & ±2h clamp) ──
const timeToMin = t => { const [h,m] = t.split(':').map(Number); return h*60 + m; };
const minToTime = x => { x=((x%1440)+1440)%1440; return `${String(Math.floor(x/60)).padStart(2,'0')}:${String(x%60).padStart(2,'0')}`; };
const minToTimeRaw = x => { x=Math.max(0,Math.min(1439,x)); return `${String(Math.floor(x/60)).padStart(2,'0')}:${String(x%60).padStart(2,'0')}`; };
function clampTime(t, rec, span) {        // keep t within ±span minutes of rec
  if (!rec) return t;
  const v = timeToMin(t), r = timeToMin(rec);
  return minToTime(Math.max(r-span, Math.min(r+span, v)));
}

// ═══════════════════════════════════════════════
// One-time Seed / Migration
// ═══════════════════════════════════════════════
function runSeedV1() {
  // Supplements: add any missing catalog item, and backfill recommendation
  // metadata onto items that already exist by the same name.
  SUPP_SEED.forEach(seed => {
    let s = appData.supplements.find(x => x.name === seed.name);
    if (!s) { s = { id: uid() }; appData.supplements.push(s); }
    Object.assign(s, {
      name: seed.name, iconKey: s.iconKey || seed.iconKey,
      dose: seed.dose, perWeek: seed.perWeek,
      recTime: seed.recTime, recLabel: seed.recLabel, note: seed.note,
    });
  });

  // Fitness: drop the less-common exercises (and their records), then add the new set.
  const removedIds = appData.fitness.filter(f => FIT_REMOVE_ICONS.includes(f.iconKey)).map(f => f.id);
  appData.fitness  = appData.fitness.filter(f => !FIT_REMOVE_ICONS.includes(f.iconKey));
  if (removedIds.length)
    appData.records = appData.records.filter(r => !(r.type==='fitness' && removedIds.includes(r.itemId)));

  FIT_SEED.forEach(seed => {
    if (!appData.fitness.some(f => f.name === seed.name))
      appData.fitness.push({ id: uid(), ...seed });
  });
}

// V2: rename "Full Spectrum Mineral Caps (Now)" → "Full Spectrum Mineral Caps",
//     and refresh recommended metadata (e.g. morning 08:00 → 09:00).
function runSeedV2() {
  const OLD = 'Full Spectrum Mineral Caps (Now)';
  const NEW = 'Full Spectrum Mineral Caps';
  appData.supplements.forEach(s => { if (s.name === OLD) s.name = NEW; });
  appData.records.forEach(r => { if (r.itemName === OLD) r.itemName = NEW; });

  SUPP_SEED.forEach(seed => {
    const s = appData.supplements.find(x => x.name === seed.name);
    if (s) Object.assign(s, {
      dose: seed.dose, perWeek: seed.perWeek,
      recTime: seed.recTime, recLabel: seed.recLabel, note: seed.note,
    });
  });
}

// Run any pending one-time migrations, then stamp the current version.
const SEED_VERSION = 2;
function runMigrations() {
  const v = appData.seedVersion || 0;
  if (v < 1) runSeedV1();
  if (v < 2) runSeedV2();
  const pending = v < SEED_VERSION;
  appData.seedVersion = SEED_VERSION;
  return pending;
}

// ═══════════════════════════════════════════════
// Supabase Load / Save
// ═══════════════════════════════════════════════
let saveTimer = null;
function scheduleSave() {
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1600);
}

async function doSave() {
  try {
    const blob = new Blob([JSON.stringify(appData)], { type: 'application/json' });
    const { error } = await sb.storage.from(BUCKET).upload(CSV_FILE, blob, { upsert: true, contentType: 'application/json' });
    if (error) throw error;
    setStatus('saved');
  } catch(e) {
    console.error(e);
    setStatus('error');
  }
}

async function doLoad() {
  setStatus('saving');
  try {
    const { data:{ publicUrl } } = sb.storage.from(BUCKET).getPublicUrl(CSV_FILE);
    const res = await fetch(publicUrl + '?t=' + Date.now(), {
      cache: 'no-store', headers: { 'Cache-Control': 'no-cache, no-store' }
    });
    if (res.ok) {
      const parsed = await res.json();
      appData = { supplements:[], fitness:[], records:[], ...parsed };
    }
    setStatus('saved');
  } catch(e) {
    // File likely doesn't exist yet — start fresh
    setStatus('saved');
  }
}

function setStatus(s) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + s;
  el.textContent = { saving:'저장 중...', saved:'저장됨', error:'저장 오류', idle:'로딩 중...' }[s] || '';
}

  const { type, id } = infoCtx;
  const arr  = type === 'supplement' ? appData.supplements : appData.fitness;
  const item = arr.find(x => x.id === id);
  if (!item) { closeOverlay('info-overlay'); return; }

  const kind = type === 'supplement' ? '보조제' : '운동';
  if (!confirm(`'${item.name}' ${kind}을(를) 삭제할까요?\n관련된 캘린더 기록도 함께 삭제됩니다.`)) return;

  if (type === 'supplement') {
    appData.supplements = appData.supplements.filter(s => s.id !== id);
    appData.records = appData.records.filter(r => !(r.type === 'supplement' && r.itemId === id));
  } else {
    appData.fitness = appData.fitness.filter(f => f.id !== id);
    appData.records = appData.records.filter(r => !(r.type === 'fitness' && r.itemId === id));
  }
  infoCtx = null;
  closeOverlay('info-overlay');
  renderAll();
  scheduleSave();
}

function renderCal() {
  const today      = fmtDate(new Date());
  const thisMonday = getThisMonday();
  const viewStart  = addDays(thisMonday, -7 + viewOffset * 7);
  const viewEnd    = addDays(viewStart, 27);

  document.getElementById('cal-range').textContent =
    `${viewStart.getMonth()+1}월 ${viewStart.getDate()}일 – ${viewEnd.getMonth()+1}월 ${viewEnd.getDate()}일`;

  const weeksEl = document.getElementById('cal-weeks');
  weeksEl.innerHTML = '';

  for (let w = 0; w < 4; w++) {
    const weekMon    = addDays(viewStart, w*7);
    const weekMonStr = fmtDate(weekMon);
    const isThisWeek = weekMonStr === fmtDate(thisMonday);

    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';

    for (let d = 0; d < 7; d++) {
      const day     = addDays(weekMon, d);
      const dateStr = fmtDate(day);
      const isToday = dateStr === today;
      const isSat   = d === 5, isSun = d === 6;

      const dayEl = document.createElement('div');
      dayEl.className = 'cal-day' + (isThisWeek?' this-week':'') + (isToday?' today':'');

      let numCls = 'day-num' + (isToday?' today-n':isSat?' sat-n':isSun?' sun-n':'');
      dayEl.innerHTML = `<div class="${numCls}">${day.getDate()}</div><div class="day-entries"></div>`;

      const entriesEl = dayEl.querySelector('.day-entries');
      const recs = appData.records
        .filter(r => r.date === dateStr)
        .sort((a,b) => a.time.localeCompare(b.time));

      recs.forEach(r => {
        const e = document.createElement('div');
        e.className = `d-entry type-${r.type}`;
        e.innerHTML = `<span class="d-entry-icon">${iconOf(r.type, r.iconKey)}</span>
          <span class="d-entry-text" title="${esc(r.itemName)} | ${fmt12(r.time)}">${esc(r.itemName)} | ${fmt12(r.time)}</span>`;
        entriesEl.appendChild(e);
      });

      setupDayInteraction(dayEl, dateStr);
      weekEl.appendChild(dayEl);
    }
    weeksEl.appendChild(weekEl);
  }
}

// ═══════════════════════════════════════════════
// Day Interaction
//   Desktop : left-click → detail popup
//             right-click → edit modal
//   Touch   : tap         → detail popup
//             long-press  → edit modal
// ═══════════════════════════════════════════════
function setupDayInteraction(el, dateStr) {
  // ── Desktop ──────────────────────────────────
  el.addEventListener('click', () => openDayDetail(dateStr));

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    openDayModal(dateStr);
  });

  // ── Touch ─────────────────────────────────────
  let touchTimer = null;
  let longFired  = false;

  el.addEventListener('touchstart', e => {
    e.preventDefault();          // blocks synthetic click from firing after touchend
    longFired = false;
    el.classList.add('pressing');
    touchTimer = setTimeout(() => {
      longFired = true;
      el.classList.remove('pressing');
      openDayModal(dateStr);
    }, 600);
  }, { passive: false });

  el.addEventListener('touchend', () => {
    clearTimeout(touchTimer);
    el.classList.remove('pressing');
    if (!longFired) openDayDetail(dateStr);   // short tap
    longFired = false;
  });

  el.addEventListener('touchcancel', () => {
    clearTimeout(touchTimer);
    longFired = false;
    el.classList.remove('pressing');
  });

  el.addEventListener('touchmove', () => {
    clearTimeout(touchTimer);
    longFired = true;             // cancel the tap-open if finger moved
    el.classList.remove('pressing');
  }, { passive: true });
}

const DAY_NAMES = ['일','월','화','수','목','금','토'];

function openDayDetail(dateStr) {
  selDay = dateStr;
  const [y, m, d] = dateStr.split('-');
  const dateObj = new Date(dateStr + 'T00:00:00');
  const dayName = DAY_NAMES[dateObj.getDay()];
  const isToday = dateStr === fmtDate(new Date());

  document.getElementById('detail-date').textContent =
    `${parseInt(m)}월 ${parseInt(d)}일`;
  document.getElementById('detail-sub').textContent =
    `${y}년 · ${dayName}요일${isToday ? ' · 오늘' : ''}`;

  const dayRecs = appData.records
    .filter(r => r.date === dateStr)
    .sort((a, b) => a.time.localeCompare(b.time));

  const suppRecs = dayRecs.filter(r => r.type === 'supplement');
  const fitRecs  = dayRecs.filter(r => r.type === 'fitness');

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  if (!suppRecs.length && !fitRecs.length) {
    body.innerHTML = '<div class="detail-empty">기록된 항목이 없습니다.<br>편집 버튼으로 항목을 추가하세요.</div>';
  } else {
    if (suppRecs.length) {
      const h = document.createElement('div');
      h.className = 'detail-section-title';
      h.textContent = '💊 보조제';
      body.appendChild(h);
      suppRecs.forEach(r => body.appendChild(makeDetailItem(r)));
    }
    if (fitRecs.length) {
      const h = document.createElement('div');
      h.className = 'detail-section-title';
      h.textContent = '🏋️ 피트니스';
      body.appendChild(h);
      fitRecs.forEach(r => body.appendChild(makeDetailItem(r)));
    }
  }

  openOverlay('detail-overlay');
}

function makeDetailItem(rec) {
  const el = document.createElement('div');
  el.className = 'detail-item';
  const meta = (rec.type === 'fitness' && rec.sets)
    ? `<div class="detail-item-meta">${rec.sets}×${rec.reps}</div>` : '';
  el.innerHTML = `
    <div class="detail-item-icon">${iconOf(rec.type, rec.iconKey)}</div>
    <div style="flex:1; min-width:0">
      <div class="detail-item-name">${esc(rec.itemName)}</div>
      ${meta}
    </div>
    <div class="detail-item-time">${fmt12(rec.time)}</div>`;
  return el;
}

function openDayEditFromDetail() {
  closeOverlay('detail-overlay');
  if (selDay) openDayModal(selDay);
}

// ═══════════════════════════════════════════════
// View Navigation
// ═══════════════════════════════════════════════
function shiftView(delta) {
  if (delta === 0) { viewOffset = 0; }
  else { viewOffset += delta; }
  renderCal();
}

// ═══════════════════════════════════════════════
// Overlays
// ═══════════════════════════════════════════════
function openOverlay(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); }

document.querySelectorAll('.overlay').forEach(ov =>
  ov.addEventListener('mousedown', e => { if (e.target===ov) closeOverlay(ov.id); })
);

// ═══════════════════════════════════════════════
// Add Modal
// ═══════════════════════════════════════════════
function openAddModal(type) {
  addType = type;
  selIcon = null;
  const isFit = type === 'fitness';
  document.getElementById('add-title').textContent = isFit ? '운동 추가' : '보조제 추가';
  document.getElementById('add-name').value = '';
  document.getElementById('add-sr-section').style.display = isFit ? '' : 'none';
  if (isFit) { document.getElementById('add-sets').value='3'; document.getElementById('add-reps').value='15'; }

  const lib  = isFit ? FIT_ICONS : SUPP_ICONS;
  const grid = document.getElementById('add-icon-grid');
  grid.innerHTML = '';
  Object.entries(lib).forEach(([key,ico]) => {
    const d = document.createElement('div');
    d.className = 'icon-opt';
    d.dataset.key = key;
    d.innerHTML = ico.svg + `<span>${ico.label}</span>`;
    d.addEventListener('click', () => {
      grid.querySelectorAll('.icon-opt').forEach(o => o.classList.remove('sel'));
      d.classList.add('sel');
      selIcon = key;
    });
    grid.appendChild(d);
  });

  openOverlay('add-overlay');
  setTimeout(() => document.getElementById('add-name').focus(), 80);
}

function confirmAdd() {
  const name = document.getElementById('add-name').value.trim();
  if (!name)    { alert('이름을 입력하세요.'); return; }
  if (!selIcon) { alert('아이콘을 선택하세요.'); return; }

  if (addType === 'supplement') {
    appData.supplements.push({ id: uid(), name, iconKey: selIcon });
  } else {
    const sets = Math.max(1, parseInt(document.getElementById('add-sets').value)||3);
    const reps = Math.max(1, parseInt(document.getElementById('add-reps').value)||15);
    appData.fitness.push({ id: uid(), name, iconKey: selIcon, sets, reps });
  }
  closeOverlay('add-overlay');
  renderAll();
  scheduleSave();
}

// ═══════════════════════════════════════════════
// Remove Modal
// ═══════════════════════════════════════════════
function openRemoveModal(type) {
  rmType = type;
  rmSet.clear();
  const isFit = type === 'fitness';
  document.getElementById('rm-title').textContent = isFit ? '운동 제거' : '보조제 제거';

  const items = isFit ? appData.fitness : appData.supplements;
  const list  = document.getElementById('rm-list');

  if (!items.length) {
    list.innerHTML = '<div class="empty-hint">목록이 비어 있습니다</div>';
    openOverlay('rm-overlay');
    return;
  }

  list.innerHTML = '';
  items.forEach(item => {
    const d = document.createElement('div');
    d.className = 'rm-item';
    d.dataset.id = item.id;
    const meta = item.sets ? ` <span style="color:#aaa;font-size:0.7rem">${item.sets}×${item.reps}</span>` : '';
    d.innerHTML = `<div class="item-icon-wrap" style="width:28px;height:28px">${iconOf(type, item.iconKey)}</div>
      <div class="rm-item-name">${esc(item.name)}${meta}</div>
      <div class="rm-chk">☐</div>`;
    d.addEventListener('click', () => {
      if (rmSet.has(item.id)) {
        rmSet.delete(item.id);
        d.classList.remove('sel');
        d.querySelector('.rm-chk').textContent = '☐';
      } else {
        rmSet.add(item.id);
        d.classList.add('sel');
        d.querySelector('.rm-chk').textContent = '☑';
      }
    });
    list.appendChild(d);
  });

  openOverlay('rm-overlay');
}

function confirmRemove() {
  if (!rmSet.size) { closeOverlay('rm-overlay'); return; }
  if (rmType === 'supplement') {
    appData.supplements = appData.supplements.filter(s => !rmSet.has(s.id));
    appData.records = appData.records.filter(r => !(r.type==='supplement' && rmSet.has(r.itemId)));
  } else {
    appData.fitness = appData.fitness.filter(f => !rmSet.has(f.id));
    appData.records = appData.records.filter(r => !(r.type==='fitness' && rmSet.has(r.itemId)));
  }
  rmSet.clear();
  closeOverlay('rm-overlay');
  renderAll();
  scheduleSave();
}

// ═══════════════════════════════════════════════
// Day Modal
// ═══════════════════════════════════════════════
function openDayModal(dateStr) {
  selDay = dateStr;
  const [y,m,d] = dateStr.split('-');
  document.getElementById('day-title').textContent = `${parseInt(m)}월 ${parseInt(d)}일 (${y})`;

  const dayRecs = appData.records.filter(r => r.date === dateStr);

  // Supplements
  const suppEl = document.getElementById('day-supp-items');
  suppEl.innerHTML = '';
  if (!appData.supplements.length) {
    suppEl.innerHTML = '<div style="color:#bbb;font-size:0.76rem;padding:6px 8px;font-family:\'Noto Sans KR\',sans-serif">보조제 목록이 없습니다</div>';
  } else {
    appData.supplements.forEach(s => {
      const rec = dayRecs.find(r => r.type==='supplement' && r.itemId===s.id);
      suppEl.appendChild(makeDayItem(s, 'supplement', rec));
    });
  }

  // Fitness
  const fitEl = document.getElementById('day-fit-items');
  fitEl.innerHTML = '';
  if (!appData.fitness.length) {
    fitEl.innerHTML = '<div style="color:#bbb;font-size:0.76rem;padding:6px 8px;font-family:\'Noto Sans KR\',sans-serif">운동 목록이 없습니다</div>';
  } else {
    appData.fitness.forEach(f => {
      const rec = dayRecs.find(r => r.type==='fitness' && r.itemId===f.id);
      fitEl.appendChild(makeDayItem(f, 'fitness', rec));
    });
  }

  openOverlay('day-overlay');
}

function makeDayItem(item, type, existRec) {
  const on = !!existRec;
  const el = document.createElement('div');
  el.className = 'day-item';
  el.dataset.itemId = item.id;
  el.dataset.type   = type;
  el.dataset.recId  = existRec ? existRec.id : '';

  // meta line
  let meta = '';
  if (type === 'fitness') meta = `<div class="day-item-meta">${item.sets}×${item.reps}</div>`;
  else if (item.dose || item.recLabel)
    meta = `<div class="day-item-meta">${esc([item.dose, item.recLabel].filter(Boolean).join(' · '))}</div>`;

  // recommended time → auto-filled; adjustable in 15-min steps within ±3h (supplements only)
  const recTime = type === 'supplement' ? (item.recTime || '') : '';
  el.dataset.recTime = recTime;
  const defTime = existRec ? existRec.time : (recTime || (type === 'fitness' ? '18:00' : '09:00'));

  // step bounds
  let lo, hi;
  if (recTime) { lo = timeToMin(recTime) - 180; hi = timeToMin(recTime) + 180; }
  else         { lo = 0; hi = 1425; }                       // free range, 23:45 max
  lo = Math.ceil(Math.max(0, lo) / 15) * 15;                // snap bounds to 15-min grid
  hi = Math.floor(Math.min(1439, hi) / 15) * 15;

  const hint = recTime
    ? `<span class="time-hint">권장 ${fmt12(recTime)} · ±3시간 (15분 단위)</span>`
    : `<span class="time-hint">15분 단위</span>`;

  el.innerHTML = `
    <div class="day-item-icon">${iconOf(type, item.iconKey)}</div>
    <div class="day-item-body">
      <div class="day-item-name">${esc(item.name)}</div>${meta}
      <div class="day-item-time-wrap" style="display:${on?'flex':'none'}">
        <div class="time-stepper" data-time="${defTime}" data-lo="${lo}" data-hi="${hi}">
          <button type="button" class="step-btn" data-dir="-1" aria-label="15분 빼기">−</button>
          <span class="time-val">${fmt12(defTime)}</span>
          <button type="button" class="step-btn" data-dir="1" aria-label="15분 더하기">+</button>
        </div>
        ${hint}
      </div>
    </div>
    <div class="check-circle ${on?'on':''}">${on?'✓':''}</div>`;

  const circle   = el.querySelector('.check-circle');
  const timeWrap = el.querySelector('.day-item-time-wrap');
  const stepper  = el.querySelector('.time-stepper');
  const valSpan  = el.querySelector('.time-val');
  const minusBtn = el.querySelector('.step-btn[data-dir="-1"]');
  const plusBtn  = el.querySelector('.step-btn[data-dir="1"]');

  function renderStep() {
    const cur = timeToMin(stepper.dataset.time);
    valSpan.textContent = fmt12(stepper.dataset.time);
    minusBtn.disabled = cur <= lo;
    plusBtn.disabled  = cur >= hi;
  }
  function setTime(mins) {
    mins = Math.max(lo, Math.min(hi, mins));
    stepper.dataset.time = minToTimeRaw(mins);
    renderStep();
  }
  el.querySelectorAll('.step-btn').forEach(b =>
    b.addEventListener('click', e => {
      e.stopPropagation();
      setTime(timeToMin(stepper.dataset.time) + (+b.dataset.dir) * 15);
    })
  );
  renderStep();

  el.addEventListener('click', e => {
    if (e.target.closest('.day-item-time-wrap')) return;   // adjusting time, don't toggle
    const wasOn = circle.classList.contains('on');
    circle.classList.toggle('on', !wasOn);
    circle.textContent = !wasOn ? '✓' : '';
    timeWrap.style.display = !wasOn ? 'flex' : 'none';
    if (!wasOn) { stepper.dataset.time = defTime; renderStep(); }   // reset to recommended
  });
  return el;
}

function saveDayChanges() {
  if (!selDay) return;

  function processItems(containerEl, type, itemsArr) {
    containerEl.querySelectorAll('.day-item').forEach(el => {
      const itemId  = el.dataset.itemId;
      const recId   = el.dataset.recId;
      const recTime = el.dataset.recTime || '';
      const isOn    = el.querySelector('.check-circle').classList.contains('on');
      const stepper = el.querySelector('.time-stepper');

      let time = (stepper && stepper.dataset.time) || recTime || '09:00';
      if (recTime) time = clampTime(time, recTime, 180);   // enforce ±3h

      if (isOn) {
        const item = itemsArr.find(x => x.id === itemId);
        if (!item) return;
        if (recId) {                                        // update existing record's time
          const rec = appData.records.find(r => r.id === recId);
          if (rec) { rec.time = time; rec.itemName = item.name; rec.iconKey = item.iconKey; }
        } else {                                            // create new record
          const rec = { id:uid(), date:selDay, time, type, itemId:item.id, itemName:item.name, iconKey:item.iconKey };
          if (type==='fitness') { rec.sets=item.sets; rec.reps=item.reps; }
          appData.records.push(rec);
        }
      } else if (!isOn && recId) {
        appData.records = appData.records.filter(r => r.id !== recId);
      }
    });
  }

  processItems(document.getElementById('day-supp-items'), 'supplement', appData.supplements);
  processItems(document.getElementById('day-fit-items'),  'fitness',    appData.fitness);

  closeOverlay('day-overlay');
  renderAll();
  scheduleSave();
}

// ═══════════════════════════════════════════════
// Keyboard
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['add-overlay','rm-overlay','day-overlay','detail-overlay','info-overlay'].forEach(closeOverlay);
  }
  if (e.key === 'Enter') {
    if (!document.getElementById('add-overlay').classList.contains('hidden')) confirmAdd();
    if (!document.getElementById('day-overlay').classList.contains('hidden'))  saveDayChanges();
  }
});

// ═══════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════
(async () => {
  await doLoad();
  if (runMigrations()) scheduleSave();   // seed new items / apply one-time fixes
  renderAll();
})();
</script>
